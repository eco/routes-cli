services:
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: anvil
    command: >
      --fork-url ${FORK_RPC_URL}
      --fork-block-number ${FORK_BLOCK_NUMBER:-28000000}
      --chain-id 8453
      --host 0.0.0.0
      --port 8545
      --silent
    ports:
      - "8545:8545"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "cast block-number --rpc-url http://localhost:8545 > /dev/null 2>&1"
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 5s
